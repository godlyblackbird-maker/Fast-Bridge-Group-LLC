<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="FBG favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f6fb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff4b4b"/>
      <stop offset="1" stop-color="#c91515"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#8b0d0d" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect x="18" y="18" width="220" height="220" rx="58" fill="url(#bg)"/>
  <rect x="18" y="18" width="220" height="220" rx="58" fill="none" stroke="#d6dde9" stroke-width="4"/>

  <g filter="url(#shadow)">
    <text
      x="128"
      y="156"
      text-anchor="middle"
      font-family="Arial Black, Arial, sans-serif"
      font-size="108"
      font-weight="900"
      letter-spacing="-8"
      fill="url(#accent)"
      stroke="#ffffff"
      stroke-width="12"
      paint-order="stroke fill"
    >FBG</text>
  </g>
</svg>