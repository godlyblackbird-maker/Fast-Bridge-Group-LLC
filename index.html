        html[data-theme] {

            --surface-bottom: rgba(255, 255, 255, 0.04);

            --body-glow-a: transparent;
            --body-glow-b: transparent;
            --body-glow-c: transparent;
            --body-glow-d: transparent;
            --body-glow-e: transparent;
            --orb-a: transparent;
            --orb-b: transparent;
            --login-border: rgba(var(--accent-rgb), 0.28);
            --login-shadow: 0 16px 34px rgba(var(--accent-rgb), 0.18);
            --login-hover-border: rgba(var(--accent-light-rgb), 0.46);
            --login-hover-shadow: 0 20px 38px rgba(var(--accent-rgb), 0.24);
            --eyebrow-border: rgba(var(--accent-rgb), 0.18);
            --eyebrow-bg: rgba(255, 255, 255, 0.08);
            --secondary-border: rgba(var(--accent-rgb), 0.18);
            --secondary-bg: rgba(255, 255, 255, 0.08);
            --metric-bg: rgba(255, 255, 255, 0.1);
            --metric-border: rgba(var(--accent-rgb), 0.14);
            --ops-bg: rgba(255, 255, 255, 0.08);
            --ops-border: rgba(var(--accent-rgb), 0.12);
            --footer-text: var(--text-muted);
            --brand-shadow: var(--glass-shadow);
            --primary-cta-start: rgba(var(--accent-rgb), 0.96);
            --primary-cta-end: rgba(var(--accent-light-rgb), 0.88);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            background: transparent;
            background-color: var(--bg-dark);
            overflow-x: hidden;
        }

        html[data-theme='sunset'] body {
            background: transparent;
            background-color: var(--bg-dark);
        }

        html[data-theme='dark'] body {
            background: transparent;
            background-color: var(--bg-dark);
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            pointer-events: none;
            z-index: 0;
            border-radius: 999px;
            filter: blur(24px);
            opacity: 0.65;
        }

        body::before {
            top: 100px;
            right: -120px;
            width: 320px;
            height: 320px;
            background: var(--orb-a);
        }

        body::after {
            left: -90px;
            bottom: 40px;
            width: 260px;
            height: 260px;
            background: var(--orb-b);
        }

            position: relative;
            z-index: 1;
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;

            justify-content: space-between;
            gap: 20px;
            padding: 18px 0 6px;

            display: flex;

            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;

    <script>
        (function () {
            const HOMEPAGE_THEME_KEY = 'homepageTheme';
            const HOMEPAGE_THEME_STORE_KEY = 'homepageThemeByUser';
            const USER_THEME_KEY = 'dashboardThemeByUser';
            const BLACKLIGHT_FLUID_CURSOR_SETTINGS_KEY = 'blacklightFluidCursorSettingsByUser';
            const HOMEPAGE_LIQUID_SMOKE_ENABLED_KEY = 'homepageLiquidSmokeEnabledByUser';
            const HOMEPAGE_CLOUD_LIQUID_HOST_SELECTOR = '.hero-panel, .hero-side, #platform .section-card';
            const HOMEPAGE_CLOUD_LIQUID_HTML2CANVAS_PATH = 'Themes/Liquid%20Glass%20Theme/liquidGL-main/liquidGL-main/scripts/html2canvas.min.js';
            const HOMEPAGE_CLOUD_GLASS_CSS_PATH = 'Themes/Liquid%20Glass%20Theme/liquid-glass-js-main/liquid-glass-js-main/glass.css';
            const HOMEPAGE_CLOUD_GLASS_SCRIPT_PATH = 'Themes/Liquid%20Glass%20Theme/liquid-glass-js-main/liquid-glass-js-main/container.js';
            const ALLOWED_PUBLIC_PAGE_THEMES = ['dark', 'light', 'beach', 'cloud', 'swamp', 'sunset', 'space', 'cyberpunk', 'japan', 'holloween', 'christmas'];
            const THEME_LABELS = {
                dark: 'Dark',
                light: 'Light',
                beach: 'Beach',
                cloud: 'Cloud',
                swamp: 'Swamp',
                sunset: 'Sunset',
                space: 'Space',
                cyberpunk: 'Cyberpunk',
                japan: 'Japan',
                holloween: 'Fall',
                christmas: 'Christmas'
            };
            const DEFAULT_BLACKLIGHT_FLUID_CURSOR_SETTINGS = Object.freeze({
                size: 0.42,
                velocity: 5400,
                colorMode: 'dynamic',
                colorDynamics: 0.35,
                brightness: 1,
                solidColor: '#ff54c4'
            });
            const HOMEPAGE_LIQUID_SMOKE_THEMES = new Set(ALLOWED_PUBLIC_PAGE_THEMES);
            let homepageBlacklightFluidModulePromise = null;
            let homepageBlacklightFluidCleanup = null;
            let homepageBlacklightFluidSignature = '';
            let homepageCyberpunkCursorModulePromise = null;
            let homepageCyberpunkCursorCleanup = null;
            let homepageCloudLiquidAssetsPromise = null;
            let homepageCloudLiquidContainers = [];

            const loadScriptOnce = (src, globalName) => {
                if (globalName && typeof window[globalName] !== 'undefined') {
                    return Promise.resolve(window[globalName]);
                }

                const existingScript = document.querySelector(`script[data-dynamic-src="${src}"]`);
                if (existingScript) {
                    return new Promise((resolve, reject) => {
                        if (existingScript.dataset.loaded === 'true') {
                            resolve(globalName ? window[globalName] : true);
                            return;
                        }

                        existingScript.addEventListener('load', () => resolve(globalName ? window[globalName] : true), { once: true });
                        existingScript.addEventListener('error', () => reject(new Error(`Unable to load script: ${src}`)), { once: true });
                    });
                }

                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = src;
                    script.async = true;
                    script.dataset.dynamicSrc = src;
                    script.addEventListener('load', () => {
                        script.dataset.loaded = 'true';
                        resolve(globalName ? window[globalName] : true);
                    }, { once: true });
                    script.addEventListener('error', () => reject(new Error(`Unable to load script: ${src}`)), { once: true });
                    document.body.appendChild(script);
                });
            };

            const loadStylesheetOnce = (href) => {
                const existingLink = document.querySelector(`link[data-dynamic-href="${href}"]`);
                if (existingLink) {
                    return Promise.resolve(existingLink);
                }

                return new Promise((resolve, reject) => {
                    const link = document.createElement('link');
                    link.rel = 'stylesheet';
                    link.href = href;
                    link.dataset.dynamicHref = href;
                    link.addEventListener('load', () => resolve(link), { once: true });
                    link.addEventListener('error', () => reject(new Error(`Unable to load stylesheet: ${href}`)), { once: true });
                    document.head.appendChild(link);
                });
            };

            const ensureHomepageCloudLiquidHosts = () => {
                const hosts = Array.from(document.querySelectorAll(HOMEPAGE_CLOUD_LIQUID_HOST_SELECTOR));
                const containers = [];

                hosts.forEach((host) => {
                    if (!(host instanceof HTMLElement)) {
                        return;
                    }

                    if (host.parentElement && host.parentElement.classList.contains('cloud-liquid-homepage-container')) {
                        const existingContainer = host.parentElement.__cloudLiquidJsContainer;
                        if (existingContainer) {
                            containers.push(existingContainer);
                        }
                        host.classList.add('cloud-liquid-js-content');
                        return;
                    }

                    if (typeof window.Container !== 'function') {
                        return;
                    }

                    const computedStyle = window.getComputedStyle(host);
                    const borderRadius = Number.parseFloat(computedStyle.borderTopLeftRadius || '24') || 24;
                    const container = new window.Container({
                        borderRadius,
                        type: 'rounded',
                        tintOpacity: 0.26
                    });
                    const shell = container.element;
                    shell.classList.add('cloud-liquid-homepage-container');
                    shell.__cloudLiquidJsContainer = container;

                    const parent = host.parentElement;
                    if (!parent) {
                        return;
                    }

                    parent.insertBefore(shell, host);
                    host.classList.add('cloud-liquid-js-content');
                    shell.appendChild(host);
                    container.updateSizeFromDOM();
                    containers.push(container);
                });

                return containers;
            };

            const teardownHomepageCloudLiquidGlass = () => {
                document.querySelectorAll('.glass-container.cloud-liquid-homepage-container.cloud-liquid-js-enabled').forEach((host) => {
                    host.classList.remove('cloud-liquid-js-enabled');
                });
            };

            const loadHomepageCloudLiquidAssets = () => {
                if (!homepageCloudLiquidAssetsPromise) {
                    homepageCloudLiquidAssetsPromise = loadStylesheetOnce(HOMEPAGE_CLOUD_GLASS_CSS_PATH)
                        .then(() => loadScriptOnce(HOMEPAGE_CLOUD_LIQUID_HTML2CANVAS_PATH, 'html2canvas'))
                        .then(() => loadScriptOnce(HOMEPAGE_CLOUD_GLASS_SCRIPT_PATH, 'Container'))
                        .catch((error) => {
                            homepageCloudLiquidAssetsPromise = null;
                            throw error;
                        });
                }

                return homepageCloudLiquidAssetsPromise;
            };

            const syncHomepageCloudLiquidGlass = (themeValue) => {
                const activeTheme = resolveTheme(themeValue || getHomepageTheme());
                const shouldEnable = activeTheme === 'cloud';

                if (!shouldEnable) {
                    teardownHomepageCloudLiquidGlass();
                    return Promise.resolve(false);
                }

                return loadHomepageCloudLiquidAssets().then(() => {
                    if (resolveTheme(getHomepageTheme()) !== 'cloud') {
                        return false;
                    }

                    if (typeof window.Container !== 'function') {
                        return false;
                    }

                    window.glassControls = {
                        edgeIntensity: 0.042,
                        rimIntensity: 0.16,
                        baseIntensity: 0.024,
                        edgeDistance: 0.14,
                        rimDistance: 1.14,
                        baseDistance: 0.09,
                        cornerBoost: 0.056,
                        rippleEffect: 0.1,
                        blurRadius: 11.5,
                        tintOpacity: 0.16
                    };

                    if (homepageCloudLiquidContainers.length === 0) {
                        homepageCloudLiquidContainers = ensureHomepageCloudLiquidHosts();
                    }

                    if (!homepageCloudLiquidContainers.length) {
                        return false;
                    }

                    homepageCloudLiquidContainers.forEach((container) => {
                        if (!container || !(container.element instanceof HTMLElement)) {
                            return;
                        }
                        container.element.classList.add('cloud-liquid-js-enabled');
                        if (typeof container.updateSizeFromDOM === 'function') {
                            container.updateSizeFromDOM();
                        }
                        if (typeof container.render === 'function') {
                            container.render();
                        }
                    });

                    return homepageCloudLiquidContainers.length > 0;
                }).catch(() => false);
            };

            const readJson = (key) => {
                try {
                    return JSON.parse(localStorage.getItem(key) || '{}');
                } catch (error) {
                    return {};
                }
            };

            const getUserThemeContext = () => {
                const profile = readJson('userProfile');
                const user = readJson('user');
                const authToken = String(localStorage.getItem('authToken') || sessionStorage.getItem('authToken') || '').trim();
                const userEmail = String(user.email || '').trim().toLowerCase();
                const profileEmail = String(profile.email || '').trim().toLowerCase();
                const canUseProfileIdentity = !authToken || !userEmail || !profileEmail || profileEmail === userEmail;
                const email = userEmail || (canUseProfileIdentity ? profileEmail : '');
                const name = String(user.name || (canUseProfileIdentity ? profile.name : '') || 'User').trim();
                const userKey = email || name.toLowerCase().replace(/\s+/g, '-') || 'default-user';
                return {
                    userKey,
                    email,
                    name,
                    isAuthenticated: Boolean(authToken && (email || name)),
                    hasIdentity: Boolean(email || String(user.name || (canUseProfileIdentity ? profile.name : '') || '').trim())
                };
            };

            const getAvailableHomepageThemes = () => {
                return ALLOWED_PUBLIC_PAGE_THEMES;
            };

            const resolveTheme = (value) => {
                const normalized = String(value || '').trim().toLowerCase();
                if (normalized === 'blacklight') {
                    return 'dark';
                }
                if (normalized === 'system') {
                    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                return ALLOWED_PUBLIC_PAGE_THEMES.includes(normalized) ? normalized : 'beach';
            };

            const getThemeLabel = (theme) => {
                const normalized = resolveTheme(theme);
                if (THEME_LABELS[normalized]) {
                    return THEME_LABELS[normalized];
                }
                return normalized.replace(/[-_]+/g, ' ').replace(/\b\w/g, (char) => char.toUpperCase()) || 'Beach';
            };

            const getStoredThemeValue = () => {
                const { isAuthenticated, userKey, name, email } = getUserThemeContext();
                const normalizedName = String(name || '').trim().toLowerCase().replace(/\s+/g, '-');
                const normalizedEmail = String(email || '').trim().toLowerCase();
                const candidateKeys = Array.from(new Set([userKey, normalizedEmail, normalizedName, 'default-user'].filter(Boolean)));
                const homepageThemeStore = readJson(HOMEPAGE_THEME_STORE_KEY);
                const themeStore = readJson(USER_THEME_KEY);
                const homepageTheme = String(localStorage.getItem(HOMEPAGE_THEME_KEY) || '').trim().toLowerCase();
                const scopedHomepageTheme = String(candidateKeys
                    .map((key) => homepageThemeStore && homepageThemeStore[key])
                    .find((value) => typeof value === 'string' && value.trim()) || '').trim().toLowerCase();
                const storedTheme = String(
                    scopedHomepageTheme
                    || homepageTheme
                    || (isAuthenticated
                        ? ((candidateKeys
                            .map((key) => themeStore[key] && themeStore[key].value)
                            .find((value) => typeof value === 'string' && value.trim())) || '')
                        : ((themeStore['default-user'] && themeStore['default-user'].value) || ''))
                ).trim().toLowerCase();
                return storedTheme || 'beach';
            };

            const getHomepageTheme = () => {
                return resolveTheme(getStoredThemeValue());
            };

            const saveThemePreference = (theme) => {
                const normalized = resolveTheme(theme);
                const { userKey } = getUserThemeContext();
                const homepageThemeStore = readJson(HOMEPAGE_THEME_STORE_KEY);
                const themeStore = readJson(USER_THEME_KEY);
                const themeEntryKey = userKey || 'default-user';
                const nextHomepageThemeStore = homepageThemeStore && typeof homepageThemeStore === 'object'
                    ? homepageThemeStore
                    : {};
                const nextThemeStore = themeStore && typeof themeStore === 'object'
                    ? themeStore
                    : {};

                nextHomepageThemeStore[themeEntryKey] = normalized;
                const currentThemeEntry = nextThemeStore[themeEntryKey] && typeof nextThemeStore[themeEntryKey] === 'object'
                    ? nextThemeStore[themeEntryKey]
                    : {};
                nextThemeStore[themeEntryKey] = {
                    ...currentThemeEntry,
                    value: normalized,
                    updatedAt: Date.now()
                };

                localStorage.setItem(HOMEPAGE_THEME_STORE_KEY, JSON.stringify(nextHomepageThemeStore));
                localStorage.setItem(USER_THEME_KEY, JSON.stringify(nextThemeStore));
                localStorage.setItem(HOMEPAGE_THEME_KEY, normalized);
                localStorage.setItem('theme', normalized);
            };

            const getUserScopedObject = (key, userKey) => {
                const store = readJson(key);
                return store && typeof store === 'object' ? store[userKey] : null;
            };

            const setUserScopedObject = (key, userKey, value) => {
                const store = readJson(key);
                const nextStore = store && typeof store === 'object' ? store : {};
                nextStore[userKey] = value;
                localStorage.setItem(key, JSON.stringify(nextStore));
            };

            const normalizeBlacklightFluidCursorSettings = (settingsLike, fallbackSettings) => {
                const source = settingsLike && typeof settingsLike === 'object' ? settingsLike : {};
                const fallback = fallbackSettings && typeof fallbackSettings === 'object'
                    ? fallbackSettings
                    : DEFAULT_BLACKLIGHT_FLUID_CURSOR_SETTINGS;

                const parseNumber = (value, fallbackValue, min, max) => {
                    const numeric = Number.parseFloat(String(value ?? '').trim());
                    if (!Number.isFinite(numeric)) {
                        return fallbackValue;
                    }
                    return Math.min(max, Math.max(min, numeric));
                };

                const parseColorMode = (value, fallbackValue) => {
                    const normalized = String(value || '').trim().toLowerCase();
                    return normalized === 'dynamic' || normalized === 'solid' ? normalized : fallbackValue;
                };

                const parseHexColor = (value, fallbackValue) => {
                    const normalized = String(value || '').trim();
                    return /^#[0-9a-fA-F]{6}$/.test(normalized) ? normalized.toLowerCase() : fallbackValue;
                };

                return {
                    size: parseNumber(source.size, fallback.size, 0.2, 0.9),
                    velocity: parseNumber(source.velocity, fallback.velocity, 2400, 9000),
                    colorMode: parseColorMode(source.colorMode, fallback.colorMode),
                    colorDynamics: parseNumber(source.colorDynamics, fallback.colorDynamics, 0, 4),
                    brightness: parseNumber(source.brightness, fallback.brightness, 0.2, 2.2),
                    solidColor: parseHexColor(source.solidColor, fallback.solidColor)
                };
            };

            const getLegacyBlacklightFluidCursorSettings = () => {
                const { userKey } = getUserThemeContext();
                const remembered = getUserScopedObject(USER_THEME_KEY, userKey) || getUserScopedObject(USER_THEME_KEY, 'default-user') || {};
                const controls = remembered && remembered.controls && typeof remembered.controls === 'object' ? remembered.controls : {};
                return normalizeBlacklightFluidCursorSettings({
                    size: controls['id:blacklight-fluid-size'],
                    velocity: controls['id:blacklight-fluid-velocity'],
                    colorMode: controls['id:blacklight-fluid-color-mode'],
                    colorDynamics: controls['id:blacklight-fluid-dynamics'],
                    brightness: controls['id:blacklight-fluid-brightness'],
                    solidColor: controls['id:blacklight-fluid-solid-color']
                }, DEFAULT_BLACKLIGHT_FLUID_CURSOR_SETTINGS);
            };

            const getSavedBlacklightFluidCursorSettings = () => {
                const { userKey } = getUserThemeContext();
                const stored = getUserScopedObject(BLACKLIGHT_FLUID_CURSOR_SETTINGS_KEY, userKey) || getUserScopedObject(BLACKLIGHT_FLUID_CURSOR_SETTINGS_KEY, 'default-user');
                const hasDedicatedSettings = stored
                    && typeof stored === 'object'
                    && (
                        Object.prototype.hasOwnProperty.call(stored, 'size')
                        || Object.prototype.hasOwnProperty.call(stored, 'velocity')
                        || Object.prototype.hasOwnProperty.call(stored, 'colorMode')
                        || Object.prototype.hasOwnProperty.call(stored, 'colorDynamics')
                        || Object.prototype.hasOwnProperty.call(stored, 'brightness')
                        || Object.prototype.hasOwnProperty.call(stored, 'solidColor')
                    );

                if (hasDedicatedSettings) {
                    return normalizeBlacklightFluidCursorSettings(stored, getLegacyBlacklightFluidCursorSettings());
                }

                return getLegacyBlacklightFluidCursorSettings();
            };

            const isHomepageBlacklightFluidEnabledForAllThemes = () => {
                const { userKey } = getUserThemeContext();
                const remembered = getUserScopedObject(USER_THEME_KEY, userKey) || getUserScopedObject(USER_THEME_KEY, 'default-user') || {};
                const controls = remembered && remembered.controls && typeof remembered.controls === 'object' ? remembered.controls : {};
                const rawValue = controls['id:blacklight-fluid-all-themes-toggle'];

                if (typeof rawValue === 'boolean') {
                    return rawValue;
                }

                if (typeof rawValue === 'string') {
                    const normalized = rawValue.trim().toLowerCase();
                    return normalized === 'true' || normalized === '1' || normalized === 'on';
                }

                return false;
            };

            const isHomepageLiquidSmokeEnabled = () => {
                const { userKey } = getUserThemeContext();
                const stored = getUserScopedObject(HOMEPAGE_LIQUID_SMOKE_ENABLED_KEY, userKey);

                if (typeof stored === 'boolean') {
                    return stored;
                }

                if (typeof stored === 'string') {
                    const normalized = stored.trim().toLowerCase();
                    return normalized === 'true' || normalized === '1' || normalized === 'on';
                }

                return false;
            };

            const persistHomepageLiquidSmokeEnabled = (enabled) => {
                const { userKey } = getUserThemeContext();
                const normalized = Boolean(enabled);
                setUserScopedObject(HOMEPAGE_LIQUID_SMOKE_ENABLED_KEY, userKey, normalized);
                return normalized;
            };

            const persistBlacklightFluidCursorSettings = (settingsLike) => {
                const { userKey } = getUserThemeContext();
                const normalized = normalizeBlacklightFluidCursorSettings(settingsLike, getSavedBlacklightFluidCursorSettings());
                setUserScopedObject(BLACKLIGHT_FLUID_CURSOR_SETTINGS_KEY, userKey, normalized);
                return normalized;
            };

            const getBlacklightFluidCursorConfig = () => {
                const settings = getSavedBlacklightFluidCursorSettings();
                return {
                    splatRadius: settings.size,
                    splatForce: settings.velocity,
                    colorMode: settings.colorMode,
                    colorUpdateSpeed: settings.colorDynamics,
                    brightness: settings.brightness,
                    solidColor: settings.solidColor
                };
            };

            const updateThemeSwitchUi = (activeTheme) => {
                const themeSwitchLabel = document.getElementById('homepage-theme-label');
                const themeSwitchButton = document.getElementById('homepage-theme-switch');
                const blacklightSettingsButton = document.getElementById('homepage-blacklight-settings-toggle');
                const themeLabel = getThemeLabel(activeTheme);
                if (themeSwitchLabel) {
                    themeSwitchLabel.textContent = themeLabel;
                }
                if (themeSwitchButton) {
                    themeSwitchButton.setAttribute('data-theme-choice', activeTheme);
                    themeSwitchButton.setAttribute('aria-label', `Switch homepage theme. Current theme: ${themeLabel}`);
                }
                if (blacklightSettingsButton) {
                    const shouldShowBlacklightSettings = HOMEPAGE_LIQUID_SMOKE_THEMES.has(activeTheme);
                    blacklightSettingsButton.hidden = !shouldShowBlacklightSettings;
                    blacklightSettingsButton.setAttribute('aria-hidden', shouldShowBlacklightSettings ? 'false' : 'true');
                }
            };

            const syncHomepageBlacklightFluidCursor = (themeValue) => {
                const activeTheme = resolveTheme(themeValue || getHomepageTheme());
                const config = getBlacklightFluidCursorConfig();
                const allowAllThemes = isHomepageBlacklightFluidEnabledForAllThemes();
                const isLiquidSmokeEnabled = isHomepageLiquidSmokeEnabled();
                const shouldUseLiquidSmoke = isLiquidSmokeEnabled && (HOMEPAGE_LIQUID_SMOKE_THEMES.has(activeTheme) || allowAllThemes);
                const nextSignature = JSON.stringify({
                    theme: activeTheme,
                    enabled: isLiquidSmokeEnabled,
                    allowAllThemes,
                    size: config.splatRadius,
                    velocity: config.splatForce,
                    colorMode: config.colorMode,
                    colorDynamics: config.colorUpdateSpeed,
                    brightness: config.brightness,
                    solidColor: config.solidColor
                });

                if (!shouldUseLiquidSmoke) {
                    homepageBlacklightFluidSignature = '';
                    if (typeof homepageBlacklightFluidCleanup === 'function') {
                        homepageBlacklightFluidCleanup();
                        homepageBlacklightFluidCleanup = null;
                    }
                    return Promise.resolve(false);
                }

                if (!document.body) {
                    return Promise.resolve(false);
                }

                if (typeof homepageBlacklightFluidCleanup === 'function' && homepageBlacklightFluidSignature === nextSignature) {
                    return Promise.resolve(true);
                }

                if (typeof homepageBlacklightFluidCleanup === 'function') {
                    homepageBlacklightFluidCleanup();
                    homepageBlacklightFluidCleanup = null;
                }

                if (!homepageBlacklightFluidModulePromise) {
                    homepageBlacklightFluidModulePromise = import('./temp-smokey-fluid/smokey-fluid-cursor.js').catch((error) => {
                        homepageBlacklightFluidModulePromise = null;
                        throw error;
                    });
                }

                return homepageBlacklightFluidModulePromise.then((module) => {
                    const currentTheme = resolveTheme(getHomepageTheme());
                    if (!isHomepageLiquidSmokeEnabled() || (!HOMEPAGE_LIQUID_SMOKE_THEMES.has(currentTheme) && !isHomepageBlacklightFluidEnabledForAllThemes())) {
                        return false;
                    }

                    const mountBlacklightFluidCursor = module && typeof module.mountBlacklightFluidCursor === 'function'
                        ? module.mountBlacklightFluidCursor
                        : null;

                    if (!mountBlacklightFluidCursor) {
                        return false;
                    }

                    homepageBlacklightFluidCleanup = mountBlacklightFluidCursor(config);
                    homepageBlacklightFluidSignature = nextSignature;
                    return typeof homepageBlacklightFluidCleanup === 'function';
                }).catch(() => false);
            };

            const syncHomepageCyberpunkCursor = (themeValue) => {
                const activeTheme = resolveTheme(themeValue || getHomepageTheme());

                if (activeTheme !== 'cyberpunk') {
                    if (typeof homepageCyberpunkCursorCleanup === 'function') {
                        homepageCyberpunkCursorCleanup();
                        homepageCyberpunkCursorCleanup = null;
                    }
                    return Promise.resolve(false);
                }

                if (!document.body) {
                    return Promise.resolve(false);
                }

                if (typeof homepageCyberpunkCursorCleanup === 'function') {
                    return Promise.resolve(true);
                }

                if (!homepageCyberpunkCursorModulePromise) {
                    homepageCyberpunkCursorModulePromise = import('./temp-cyberpunk-cursor/cyberpunk-neon-cursor.js').catch((error) => {
                        homepageCyberpunkCursorModulePromise = null;
                        throw error;
                    });
                }

                return homepageCyberpunkCursorModulePromise.then((module) => {
                    const mountCyberpunkCursorEffect = module && typeof module.mountCyberpunkCursorEffect === 'function'
                        ? module.mountCyberpunkCursorEffect
                        : null;

                    if (!mountCyberpunkCursorEffect) {
                        return false;
                    }

                    homepageCyberpunkCursorCleanup = mountCyberpunkCursorEffect();
                    return typeof homepageCyberpunkCursorCleanup === 'function';
                }).catch(() => false);
            };

            const applyStoredTheme = () => {
                const activeTheme = getHomepageTheme();
                const { isAuthenticated } = getUserThemeContext();
                document.documentElement.setAttribute('data-theme', activeTheme);
                document.documentElement.setAttribute('data-authenticated', isAuthenticated ? 'true' : 'false');

                if (homepageCloudThemeVideo instanceof HTMLVideoElement) {
                    homepageCloudThemeVideo.muted = true;
                    homepageCloudThemeVideo.loop = true;
                    homepageCloudThemeVideo.playsInline = true;

                    if (activeTheme === 'cloud') {
                        if (!homepageCloudThemeVideo.currentSrc) {
                            homepageCloudThemeVideo.src = 'Themes/Cloud%20Theme.mov';
                            homepageCloudThemeVideo.load();
                        }
                        const playPromise = homepageCloudThemeVideo.play();
                        if (playPromise && typeof playPromise.catch === 'function') {
                            playPromise.catch(() => {});
                        }
                    } else {
                        homepageCloudThemeVideo.pause();
                    }
                }

                updateThemeSwitchUi(activeTheme);
                syncHomepageCloudLiquidGlass(activeTheme);
                syncHomepageBlacklightFluidCursor(activeTheme);
                syncHomepageCyberpunkCursor(activeTheme);
            };

            const modal = document.getElementById('access-request-modal');
            const openButton = document.getElementById('open-access-request');
            const closeButton = document.getElementById('close-access-request');
            const form = document.getElementById('access-request-form');
            const feedback = document.getElementById('access-request-feedback');
            const submitButton = document.getElementById('submit-access-request');
            const phoneInput = document.getElementById('access-request-phone');
            const swayAccessButton = document.getElementById('open-access-request');
            const swayCards = Array.from(document.querySelectorAll('#platform .section-card'));
            const swayOpsItems = Array.from(document.querySelectorAll('.ops-item'));
            const homepageCloudThemeVideo = document.getElementById('theme-cloud-video');
            const homepageThemeSwitchButton = document.getElementById('homepage-theme-switch');
            const homepageBlacklightSettingsToggle = document.getElementById('homepage-blacklight-settings-toggle');
            const homepageBlacklightModal = document.getElementById('homepage-blacklight-modal');
            const homepageBlacklightClose = document.getElementById('homepage-blacklight-close');
            const homepageBlacklightCloseFooter = document.getElementById('homepage-blacklight-close-footer');
            const homepageBlacklightFluidSize = document.getElementById('homepage-blacklight-fluid-size');
            const homepageBlacklightFluidVelocity = document.getElementById('homepage-blacklight-fluid-velocity');
            const homepageBlacklightFluidColorMode = document.getElementById('homepage-blacklight-fluid-color-mode');
            const homepageBlacklightFluidEnabled = document.getElementById('homepage-blacklight-fluid-enabled');
            const homepageBlacklightFluidDynamics = document.getElementById('homepage-blacklight-fluid-dynamics');
            const homepageBlacklightFluidBrightness = document.getElementById('homepage-blacklight-fluid-brightness');
            const homepageBlacklightFluidSolidColor = document.getElementById('homepage-blacklight-fluid-solid-color');
            const homepageBlacklightFluidSizeValue = document.getElementById('homepage-blacklight-fluid-size-value');
            const homepageBlacklightFluidVelocityValue = document.getElementById('homepage-blacklight-fluid-velocity-value');
            const homepageBlacklightFluidDynamicsValue = document.getElementById('homepage-blacklight-fluid-dynamics-value');
            const homepageBlacklightFluidBrightnessValue = document.getElementById('homepage-blacklight-fluid-brightness-value');
            const homepageBlacklightFluidSolidColorValue = document.getElementById('homepage-blacklight-fluid-solid-color-value');
            const homepageBlacklightFluidDynamicsRow = document.getElementById('homepage-blacklight-fluid-dynamics-row');
            const homepageBlacklightFluidSolidColorRow = document.getElementById('homepage-blacklight-fluid-solid-color-row');

            const syncHomepageBlacklightSliderFill = (slider) => {
                if (!(slider instanceof HTMLInputElement) || String(slider.type || '').toLowerCase() !== 'range') {
                    return;
                }
                const min = Number.parseFloat(slider.min || '0');
                const max = Number.parseFloat(slider.max || '100');
                const value = Number.parseFloat(slider.value || slider.min || '0');
                const safeRange = max > min ? max - min : 1;
                const progress = ((value - min) / safeRange) * 100;
                slider.style.setProperty('--range-progress', `${Math.min(100, Math.max(0, progress))}%`);
            };

            const syncHomepageBlacklightControlVisibility = () => {
                const activeTheme = getHomepageTheme();
                const colorMode = homepageBlacklightFluidColorMode ? String(homepageBlacklightFluidColorMode.value || DEFAULT_BLACKLIGHT_FLUID_CURSOR_SETTINGS.colorMode).trim().toLowerCase() : DEFAULT_BLACKLIGHT_FLUID_CURSOR_SETTINGS.colorMode;
                if (homepageBlacklightFluidDynamicsRow) {
                    homepageBlacklightFluidDynamicsRow.hidden = !HOMEPAGE_LIQUID_SMOKE_THEMES.has(activeTheme) || colorMode !== 'dynamic';
                }
                if (homepageBlacklightFluidSolidColorRow) {
                    homepageBlacklightFluidSolidColorRow.hidden = !HOMEPAGE_LIQUID_SMOKE_THEMES.has(activeTheme) || colorMode !== 'solid';
                }
                if (homepageBlacklightModal && !HOMEPAGE_LIQUID_SMOKE_THEMES.has(activeTheme)) {
                    homepageBlacklightModal.classList.remove('is-open');
                    homepageBlacklightModal.setAttribute('aria-hidden', 'true');
                }
            };

            const syncHomepageBlacklightControlLabels = () => {
                if (homepageBlacklightFluidSize && homepageBlacklightFluidSizeValue) {
                    homepageBlacklightFluidSizeValue.textContent = `${Math.round(Number.parseFloat(homepageBlacklightFluidSize.value || String(DEFAULT_BLACKLIGHT_FLUID_CURSOR_SETTINGS.size)) * 100)}%`;
                    syncHomepageBlacklightSliderFill(homepageBlacklightFluidSize);
                }
                if (homepageBlacklightFluidVelocity && homepageBlacklightFluidVelocityValue) {
                    homepageBlacklightFluidVelocityValue.textContent = String(Math.round(Number.parseFloat(homepageBlacklightFluidVelocity.value || String(DEFAULT_BLACKLIGHT_FLUID_CURSOR_SETTINGS.velocity))));
                    syncHomepageBlacklightSliderFill(homepageBlacklightFluidVelocity);
                }
                if (homepageBlacklightFluidDynamics && homepageBlacklightFluidDynamicsValue) {
                    homepageBlacklightFluidDynamicsValue.textContent = `${Number.parseFloat(homepageBlacklightFluidDynamics.value || String(DEFAULT_BLACKLIGHT_FLUID_CURSOR_SETTINGS.colorDynamics)).toFixed(2)}x`;
                    syncHomepageBlacklightSliderFill(homepageBlacklightFluidDynamics);
                }
                if (homepageBlacklightFluidBrightness && homepageBlacklightFluidBrightnessValue) {
                    homepageBlacklightFluidBrightnessValue.textContent = `${Math.round(Number.parseFloat(homepageBlacklightFluidBrightness.value || String(DEFAULT_BLACKLIGHT_FLUID_CURSOR_SETTINGS.brightness)) * 100)}%`;
                    syncHomepageBlacklightSliderFill(homepageBlacklightFluidBrightness);
                }
                if (homepageBlacklightFluidSolidColor && homepageBlacklightFluidSolidColorValue) {
                    homepageBlacklightFluidSolidColorValue.textContent = String(homepageBlacklightFluidSolidColor.value || DEFAULT_BLACKLIGHT_FLUID_CURSOR_SETTINGS.solidColor).toUpperCase();
                }
            };

            const populateHomepageBlacklightControls = () => {
                const settings = getSavedBlacklightFluidCursorSettings();
                if (homepageBlacklightFluidEnabled instanceof HTMLInputElement) {
                    homepageBlacklightFluidEnabled.checked = isHomepageLiquidSmokeEnabled();
                }
                if (homepageBlacklightFluidSize) {
                    homepageBlacklightFluidSize.value = String(settings.size);
                }
                if (homepageBlacklightFluidVelocity) {
                    homepageBlacklightFluidVelocity.value = String(settings.velocity);
                }
                if (homepageBlacklightFluidColorMode) {
                    homepageBlacklightFluidColorMode.value = settings.colorMode;
                }
                if (homepageBlacklightFluidDynamics) {
                    homepageBlacklightFluidDynamics.value = String(settings.colorDynamics);
                }
                if (homepageBlacklightFluidBrightness) {
                    homepageBlacklightFluidBrightness.value = String(settings.brightness);
                }
                if (homepageBlacklightFluidSolidColor) {
                    homepageBlacklightFluidSolidColor.value = settings.solidColor;
                }
                syncHomepageBlacklightControlLabels();
                syncHomepageBlacklightControlVisibility();
            };

            const saveHomepageBlacklightControls = () => {
                persistHomepageLiquidSmokeEnabled(homepageBlacklightFluidEnabled instanceof HTMLInputElement ? homepageBlacklightFluidEnabled.checked : true);
                persistBlacklightFluidCursorSettings({
                    size: homepageBlacklightFluidSize ? homepageBlacklightFluidSize.value : DEFAULT_BLACKLIGHT_FLUID_CURSOR_SETTINGS.size,
                    velocity: homepageBlacklightFluidVelocity ? homepageBlacklightFluidVelocity.value : DEFAULT_BLACKLIGHT_FLUID_CURSOR_SETTINGS.velocity,
                    colorMode: homepageBlacklightFluidColorMode ? homepageBlacklightFluidColorMode.value : DEFAULT_BLACKLIGHT_FLUID_CURSOR_SETTINGS.colorMode,
                    colorDynamics: homepageBlacklightFluidDynamics ? homepageBlacklightFluidDynamics.value : DEFAULT_BLACKLIGHT_FLUID_CURSOR_SETTINGS.colorDynamics,
                    brightness: homepageBlacklightFluidBrightness ? homepageBlacklightFluidBrightness.value : DEFAULT_BLACKLIGHT_FLUID_CURSOR_SETTINGS.brightness,
                    solidColor: homepageBlacklightFluidSolidColor ? homepageBlacklightFluidSolidColor.value : DEFAULT_BLACKLIGHT_FLUID_CURSOR_SETTINGS.solidColor
                });
                syncHomepageBlacklightFluidCursor(getHomepageTheme());
            };

            const openHomepageBlacklightModal = () => {
                if (!homepageBlacklightModal || !HOMEPAGE_LIQUID_SMOKE_THEMES.has(getHomepageTheme())) {
                    return;
                }
                populateHomepageBlacklightControls();
                homepageBlacklightModal.classList.add('is-open');
                homepageBlacklightModal.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
            };

            const closeHomepageBlacklightModal = () => {
                if (!homepageBlacklightModal) {
                    return;
                }
                homepageBlacklightModal.classList.remove('is-open');
                homepageBlacklightModal.setAttribute('aria-hidden', 'true');
                if (!modal || !modal.classList.contains('is-open')) {
                    document.body.style.overflow = '';
                }
            };

            const setFeedback = (message, state) => {
                if (!feedback) {
                    return;
                }

                feedback.textContent = message || '';
                feedback.classList.remove('is-error', 'is-success');
                if (state === 'error') {
                    feedback.classList.add('is-error');
                }
                if (state === 'success') {
                    feedback.classList.add('is-success');
                }
            };

            const normalizePhoneToE164 = (value) => {
                const raw = String(value || '').trim();
                if (!raw) {
                    return '';
                }

                if (raw.startsWith('+')) {
                    const digits = `+${raw.slice(1).replace(/\D/g, '')}`;
                    return /^\+[1-9]\d{7,14}$/.test(digits) ? digits : '';
                }

                const digits = raw.replace(/\D/g, '');
                if (digits.length === 10) {
                    return `+1${digits}`;
                }
                if (digits.length === 11 && digits.startsWith('1')) {
                    return `+${digits}`;
                }

                return '';
            };

            const applyPhoneFormatting = () => {
                if (!(phoneInput instanceof HTMLInputElement)) {
                    return '';
                }

                phoneInput.placeholder = '+1 (555) 123-4567';
                phoneInput.title = 'Phone numbers auto-format to +1 (555) 123-4567 and submit as E.164.';
                const normalized = normalizePhoneToE164(phoneInput.value);
                if (normalized) {
                    if (/^\+1\d{10}$/.test(normalized)) {
                        const national = normalized.slice(2);
                        phoneInput.value = `+1 (${national.slice(0, 3)}) ${national.slice(3, 6)}-${national.slice(6)}`;
                    } else {
                        phoneInput.value = normalized;
                    }
                }
                return normalized;
            };

            const closeModal = () => {
                if (!modal) {
                    return;
                }
                modal.classList.remove('is-open');
                modal.setAttribute('aria-hidden', 'true');
                document.body.style.overflow = '';
            };

            const openModal = () => {
                if (!modal) {
                    return;
                }
                modal.classList.add('is-open');
                modal.setAttribute('aria-hidden', 'false');
                document.body.style.overflow = 'hidden';
                setFeedback('', '');
                const firstField = document.getElementById('access-request-name');
                if (firstField) {
                    window.setTimeout(() => firstField.focus(), 40);
                }
            };

            if (openButton) {
                openButton.addEventListener('click', openModal);
            }

            if (closeButton) {
                closeButton.addEventListener('click', closeModal);
            }

            if (modal) {
                modal.addEventListener('click', (event) => {
                    if (event.target === modal) {
                        closeModal();
                    }
                });
            }

            if (phoneInput) {
                applyPhoneFormatting();
                phoneInput.addEventListener('blur', applyPhoneFormatting);
                phoneInput.addEventListener('change', applyPhoneFormatting);
            }

            window.addEventListener('keydown', (event) => {
                if (event.key === 'Escape' && modal && modal.classList.contains('is-open')) {
                    closeModal();
                }
                if (event.key === 'Escape' && homepageBlacklightModal && homepageBlacklightModal.classList.contains('is-open')) {
                    closeHomepageBlacklightModal();
                }
            });

            if (homepageBlacklightSettingsToggle) {
                homepageBlacklightSettingsToggle.addEventListener('click', openHomepageBlacklightModal);
            }

            if (homepageBlacklightClose) {
                homepageBlacklightClose.addEventListener('click', closeHomepageBlacklightModal);
            }

            if (homepageBlacklightCloseFooter) {
                homepageBlacklightCloseFooter.addEventListener('click', closeHomepageBlacklightModal);
            }

            if (homepageBlacklightModal) {
                homepageBlacklightModal.addEventListener('click', (event) => {
                    if (event.target === homepageBlacklightModal) {
                        closeHomepageBlacklightModal();
                    }
                });
            }

            [homepageBlacklightFluidSize, homepageBlacklightFluidVelocity, homepageBlacklightFluidDynamics, homepageBlacklightFluidBrightness].forEach((control) => {
                if (!(control instanceof HTMLInputElement)) {
                    return;
                }
                control.addEventListener('input', () => {
                    syncHomepageBlacklightControlLabels();
                    saveHomepageBlacklightControls();
                });
                control.addEventListener('change', () => {
                    syncHomepageBlacklightControlLabels();
                    saveHomepageBlacklightControls();
                });
            });

            if (homepageBlacklightFluidColorMode) {
                homepageBlacklightFluidColorMode.addEventListener('change', () => {
                    syncHomepageBlacklightControlVisibility();
                    saveHomepageBlacklightControls();
                });
            }

            if (homepageBlacklightFluidEnabled instanceof HTMLInputElement) {
                homepageBlacklightFluidEnabled.addEventListener('change', () => {
                    saveHomepageBlacklightControls();
                });
            }

            if (homepageBlacklightFluidSolidColor) {
                homepageBlacklightFluidSolidColor.addEventListener('input', () => {
                    syncHomepageBlacklightControlLabels();
                    saveHomepageBlacklightControls();
                });
                homepageBlacklightFluidSolidColor.addEventListener('change', () => {
                    syncHomepageBlacklightControlLabels();
                    saveHomepageBlacklightControls();
                });
            }

            if (form) {
                form.addEventListener('submit', async (event) => {
                    event.preventDefault();
                    setFeedback('', '');

                    const formData = new FormData(form);
                    const normalizedPhone = applyPhoneFormatting();
                    const payload = {
                        name: String(formData.get('name') || '').trim(),
                        email: String(formData.get('email') || '').trim(),
                        phone: normalizedPhone || String(formData.get('phone') || '').trim(),
                        company: String(formData.get('company') || '').trim(),
                        message: String(formData.get('message') || '').trim()
                    };

                    if (!payload.name || !payload.email) {
                        setFeedback('Name and email are required.', 'error');
                        return;
                    }

                    if (String(formData.get('phone') || '').trim() && !normalizedPhone) {
                        setFeedback('Enter the phone number in E.164 format, for example +15551234567.', 'error');
                        return;
                    }

                    if (submitButton) {
                        submitButton.disabled = true;
                        submitButton.textContent = 'Sending...';
                    }

                    try {
                        const response = await fetch('/api/access-requests', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(payload)
                        });
                        const data = await response.json();
                        if (!response.ok) {
                            throw new Error(data.error || 'Unable to submit request.');
                        }

                        form.reset();
                        setFeedback('Request received. Admin will review your info before granting FAST access.', 'success');
                        window.setTimeout(closeModal, 1600);
                    } catch (error) {
                        setFeedback(String(error.message || 'Unable to submit request.'), 'error');
                    } finally {
                        if (submitButton) {
                            submitButton.disabled = false;
                            submitButton.textContent = 'Send Request';
                        }
                    }
                });
            }

            swayCards.forEach((card) => {
                card.addEventListener('mousemove', (event) => {
                    const rect = card.getBoundingClientRect();
                    const x = event.clientX - rect.left;
                    const y = event.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = (y - centerY) / 20;
                    const rotateY = (centerX - x) / 20;

                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(10px)`;
                });

                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateZ(0)';
                });
            });

            swayOpsItems.forEach((item) => {
                item.addEventListener('mousemove', (event) => {
                    const rect = item.getBoundingClientRect();
                    const x = event.clientX - rect.left;
                    const y = event.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = (y - centerY) / 24;
                    const rotateY = (centerX - x) / 24;

                    item.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(8px)`;
                });

                item.addEventListener('mouseleave', () => {
                    item.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateZ(0)';
                });
            });

            if (swayAccessButton) {
                swayAccessButton.addEventListener('mousemove', (event) => {
                    const rect = swayAccessButton.getBoundingClientRect();
                    const x = event.clientX - rect.left;
                    const y = event.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = (y - centerY) / 26;
                    const rotateY = (centerX - x) / 26;

                    swayAccessButton.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(8px)`;
                });

                swayAccessButton.addEventListener('mouseleave', () => {
                    swayAccessButton.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateZ(0)';
                });
            }

            if (homepageThemeSwitchButton) {
                homepageThemeSwitchButton.addEventListener('click', () => {
                    const availableThemes = getAvailableHomepageThemes();
                    const activeTheme = getHomepageTheme();
                    const activeIndex = availableThemes.indexOf(activeTheme);
                    const nextTheme = availableThemes[(activeIndex + 1 + availableThemes.length) % availableThemes.length] || 'beach';
                    saveThemePreference(nextTheme);
                    applyStoredTheme();
                });
            }

            window.addEventListener('storage', applyStoredTheme);
            populateHomepageBlacklightControls();
            applyStoredTheme();
        })();
    </script>
</body>
</html>
